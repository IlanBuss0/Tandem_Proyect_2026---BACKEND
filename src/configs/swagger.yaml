            schema:
              type: object
              required:
                - nombre_usuario
                - contrasena
              properties:
                nombre_usuario:
                  type: string
                  example: matias_rod
                contrasena:
                  type: string
                  format: password
                  example: SecureP@ss123
      responses:
        '200':
          description: 'Autenticación exitosa'
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  usuario:
                    $ref: '#/components/schemas/Usuario'
        '401':
          description: 'Credenciales inválidas'
