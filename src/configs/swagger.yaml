openapi: 3.0.3
info:
  title: 'Tandem Proyect 2026 - API Backend'
  version: 1.0.0
  description: |
    # Tándem 2026 — API Backend

    API del proyecto Tándem, una plataforma de apoyo para personas con TEA (Trastorno del Espectro Autista) que integra
    gestión de usuarios, actividades, gamificación, comunicación en tiempo real y seguimiento de ubicación.

    ## Stack principal
    - **Runtime:** Node.js + Express 5
    - **Base de datos:** PostgreSQL con SQL crudo (sin ORM)
    - **Tiempo real:** Socket.io 4 (chat y notificaciones)
    - **Caché / Colas:** Redis + ioredis + BullMQ (opcional)
    - **Autenticación:** JWT custom HMAC-SHA256 + Refresh Tokens + CSRF double-submit cookie
    - **APIs externas:** ARASAAC (pictogramas), DiceBear (avatares), Supabase Storage

    ## Arquitectura
    ```
    Controller → Service → Repository → DB (PostgreSQL)
                    ↓
          CacheService (Redis) / Socket.io / APIs externas
    ```

    Middleware chain: `helmet → cors → cookieParser → rate-limit → authMiddleware (JWT) → csrfMiddleware → Controller`

    ## Documentación visual de arquitectura
    Visitá [/docs](/docs) para ver diagramas interactivos de la base de datos, flujo de autenticación,
    chat realtime, Redis, APIs externas y modelo de permisos.
servers:
  -
    url: /api
    description: 'Servidor API'
  -
    url: http://localhost:3000/api
    description: 'Servidor de Desarrollo Local'
externalDocs:
  url: /docs
  description: 'Documentación de arquitectura con diagramas interactivos'
security:
  -
    CookieAuth: []
tags:
  -
    name: Autenticación
    description: 'Registro, inicio de sesión, renovación de tokens y cierre de sesión. Usa JWT custom HMAC-SHA256 + Refresh Tokens en cookies HttpOnly.'
  -
    name: 'Gestión de Usuarios'
    description: 'CRUD de usuarios del sistema. Cada usuario tiene un rol (perteneciente, tutor, profesional o administrador) definido por `id_tipo_usuario`.'
  -
    name: 'Módulo Perteneciente'
    description: 'Gestión de pertenecientes (personas con TEA). Incluye niveles de apoyo, autonomía operativa y modo autogestionado/tutelado.'
  -
    name: 'Módulo Tutor'
    description: 'Gestión de tutores y sus vínculos con pertenecientes. Los tutores autorizan permisos y aprueban vínculos profesionales.'
  -
    name: 'Módulo Profesional'
    description: 'Gestión de profesionales (terapeutas, docentes) con validación de matrícula. Pueden asignar actividades y seguir pertenecientes vinculados.'
  -
    name: 'Actividades y Seguimiento'
    description: 'Catálogo de actividades, actividades personalizadas y asignación a pertenecientes. Incluye calificaciones, favoritos y gamificación por puntos.'
  -
    name: 'Comunicación y Social'
    description: 'Chat en tiempo real con Socket.io, contactos, bloqueos y notificaciones. Los mensajes se persisten en PostgreSQL y se emiten vía WebSocket.'
  -
    name: 'Archivos y Multimedia'
    description: 'Subida y gestión de archivos con multer, validación de magic bytes y almacenamiento en Supabase Storage. Incluye avatares y pictogramas.'
  -
    name: 'Finanzas y Suscripciones'
    description: 'Sistema de puntos, compras de paquetes, suscripciones y pagos. Los pertenecientes ganan puntos al completar actividades y pueden gastarlos en la tienda de avatares.'
  -
    name: 'Sistema y Auditoría'
    description: 'Catálogos del sistema, tipos, estados, roles de administración y registros de auditoría para trazabilidad de cambios.'
